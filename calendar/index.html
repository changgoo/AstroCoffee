<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>astro coffee — host calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="https://web.astro.princeton.edu/" target="_blank" rel="noopener"
     class="header-shield" title="Princeton Astrophysical Sciences">
    <img src="https://www.princeton.edu/favicon.ico" height="32" alt="Princeton shield">
  </a>

  <h1><a href="https://changgoo.github.io/astro-coffee-page/">astro coffee ☕</a></h1>

  <span class="header-label">Host Calendar 📅</span>

  <div class="header-spacer"></div>

  <nav class="header-links">
    <a href="https://github.com/changgoo/AstroCoffee"
       target="_blank" rel="noopener" title="GitHub repository" aria-label="GitHub">
      <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </nav>
</header>

<main>
  <div id="cal-nav">
    <button id="prev-month" aria-label="Previous month">&#8249;</button>
    <h2 id="month-label"></h2>
    <button id="next-month" aria-label="Next month">&#8250;</button>
    <button id="today-btn">Today</button>
  </div>

  <div id="loading">Loading calendar…</div>

  <div id="calendar-wrap" style="display:none">
    <div id="calendar-grid-header" class="cal-grid">
      <div class="cal-dow">Sun</div>
      <div class="cal-dow">Mon</div>
      <div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div>
      <div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div>
      <div class="cal-dow">Sat</div>
    </div>
    <div id="calendar-grid" class="cal-grid"></div>
  </div>
</main>

<footer>
  <a href="https://changgoo.github.io/AstroCoffee/intro.html" target="_blank" rel="noopener">AstroCoffee archive</a>
  &nbsp;·&nbsp;
  <a href="https://changgoo.github.io/astro-coffee-page/" target="_blank" rel="noopener">paper browser</a>
</footer>

<script src="calendar.js"></script>
</body>
</html>
