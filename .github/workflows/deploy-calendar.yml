name: deploy-calendar

on:
  push:
    branches:
    - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-calendar:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Generate periods.json
      run: python ./src/create_calendars.py

    - name: Assemble site
      run: |
        mkdir -p _site/data
        cp calendar/index.html _site/
        cp calendar/calendar.js _site/
        cp calendar/style.css _site/
        cp calendar/periods.json _site/
        cp data/hosts_*.json _site/data/
        cp data/holidays_*.json _site/data/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
