name: send-reminder

on:
  schedule:
    # Run daily at 00:00 UTC (8 PM EDT / 7 PM EST).
    # GitHub Actions may delay up to ~2.5h, so actual run is ~10:30 PM ET —
    # safely before midnight. Daily reminders go to tomorrow's host;
    # weekly reminders fire on Saturday (ET).
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to use (YYYY-MM-DD). If set, emails are sent to changgoo@princeton.edu only instead of actual recipients."
        required: false
        default: ""

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder emails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python src/send_reminder.py "${{ inputs.date }}"
          else
            REMINDER_DATE=$(python src/get_reminder_date.py)
            REMINDER_DATE=$REMINDER_DATE python src/send_reminder.py
          fi
