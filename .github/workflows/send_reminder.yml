name: send-reminder

on:
  schedule:
    # Run daily at 02:00 UTC (~9 PM ET).
    # Daily reminders go to tomorrow's host; weekly reminders fire on Saturday.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to use (YYYY-MM-DD). If set, emails are sent to changgoo@princeton.edu only instead of actual recipients."
        required: false
        default: ""

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminder emails
        env:
          SENDGRID_API_KEY: ${{ secrets.SEND_GRID_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python src/send_reminder.py "${{ inputs.date }}"
          else
            python src/send_reminder.py
          fi
